<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VisionYX — Plataformas que conectan el mundo físico con la inteligencia digital">
  <defs>
    <linearGradient id="o-bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070b16"/><stop offset="1" stop-color="#0c1430"/>
    </linearGradient>
    <radialGradient id="o-g1" cx="0" cy="0" r="1" gradientTransform="translate(980 70) scale(560)">
      <stop stop-color="#a855f7" stop-opacity="0.26"/><stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="o-g2" cx="0" cy="0" r="1" gradientTransform="translate(120 140) scale(520)">
      <stop stop-color="#22d3ee" stop-opacity="0.22"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="o-la" x1="905" y1="175" x2="980" y2="415" gradientUnits="userSpaceOnUse"><stop stop-color="#7ef0e0"/><stop offset="1" stop-color="#22d3ee"/></linearGradient>
    <linearGradient id="o-lb" x1="958" y1="175" x2="980" y2="415" gradientUnits="userSpaceOnUse"><stop stop-color="#1f9fd4"/><stop offset="1" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="o-rb" x1="1002" y1="175" x2="980" y2="415" gradientUnits="userSpaceOnUse"><stop stop-color="#3b4fd6"/><stop offset="1" stop-color="#4f46e5"/></linearGradient>
    <linearGradient id="o-ra" x1="1055" y1="175" x2="980" y2="415" gradientUnits="userSpaceOnUse"><stop stop-color="#a855f7"/><stop offset="1" stop-color="#7c5cf6"/></linearGradient>
    <linearGradient id="o-yx" x1="120" y1="350" x2="640" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/><stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="o-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#o-bg)"/>
  <rect width="1200" height="630" fill="url(#o-g1)"/>
  <rect width="1200" height="630" fill="url(#o-g2)"/>

  <!-- big faceted mark -->
  <g filter="url(#o-glow)">
    <path d="M905 175 L958 175 L980 415 Z" fill="url(#o-la)"/>
    <path d="M958 175 L980 330 L980 415 Z" fill="url(#o-lb)"/>
    <path d="M1002 175 L980 330 L980 415 Z" fill="url(#o-rb)"/>
    <path d="M1055 175 L1002 175 L980 415 Z" fill="url(#o-ra)"/>
  </g>
  <path d="M958 175 L980 415 M1002 175 L980 415" stroke="#eafcff" stroke-width="1.4" opacity="0.4"/>

  <text x="120" y="215" font-family="'Segoe UI', Arial, sans-serif" font-size="25" font-weight="700" letter-spacing="6" fill="#22d3ee">PLATAFORMAS DE MISIÓN CRÍTICA</text>
  <text x="116" y="360" font-family="Orbitron, 'Segoe UI', Arial, sans-serif" font-size="118" font-weight="800" letter-spacing="3" fill="#eaf1fb">VISION<tspan fill="url(#o-yx)">YX</tspan></text>
  <text x="122" y="430" font-family="'Segoe UI', Arial, sans-serif" font-size="33" font-weight="500" fill="#aebbd6">Conectamos el mundo físico con la inteligencia digital.</text>
  <rect x="122" y="470" width="70" height="4" rx="2" fill="url(#o-yx)"/>
  <text x="122" y="540" font-family="'Segoe UI', Arial, sans-serif" font-size="23" font-weight="500" fill="#7f93b8">Biometría · Telecom · PropTech · Document AI · Retail · IoT &amp; Edge</text>
</svg>
