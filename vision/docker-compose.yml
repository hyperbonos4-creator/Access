# urban-vision — stack del microservicio de visión (servicio + Qdrant).
#
# Aislado del compose raíz a propósito: el Vision_Service puede desplegarse en
# OTRO host (el equipo con GPU), comunicándose con el Backend solo por el
# contrato de eventos y la API de gestión (Req 1.5). Para correrlo junto al
# resto en desarrollo, ambos comparten la red externa `urban_network`.
#
# Uso:
#   cd infrastructure/urban-vision
#   cp .env.example .env        # ajustar VISION_SERVICE_TOKEN, provider, etc.
#   docker compose up -d
#
# GPU NVIDIA (producción): ver README §GPU (deploy.resources + onnxruntime-gpu).

services:
  # ─────────────────────────────────────────
  # Qdrant — Vector_Store (1 colección por conjunto_id)
  # ─────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: urban_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST/gRPC
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - urban_network

  # ─────────────────────────────────────────
  # Vision_Service — FastAPI + ONNX Runtime
  # ─────────────────────────────────────────
  vision_service:
    build:
      context: .
      dockerfile: Dockerfile
    image: urban/vision-service:0.1.0
    container_name: urban_vision
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VISION_QDRANT_URL: http://qdrant:6333
    ports:
      - "8200:8200"
    volumes:
      # Pesos ONNX persistentes (insightface los descarga aquí en el 1er uso).
      - vision_models:/models
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - urban_network
    # ── GPU NVIDIA (producción): descomentar y usar imagen CUDA (README §GPU)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  qdrant_data:
    driver: local
  vision_models:
    driver: local

# Red compartida con el stack raíz de URBAN. Crearla una vez si no existe:
#   docker network create urban_network
networks:
  urban_network:
    external: true
    name: urban_network
